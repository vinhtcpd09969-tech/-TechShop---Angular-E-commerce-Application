<div class="card h-100 shadow-sm border-0 product-card-hover">
  <img [src]="coverImage" class="card-img-top" alt="Hình sản phẩm" style="aspect-ratio: 1 / 1; object-fit: cover;">
  
  <div class="card-body d-flex flex-column p-3">
    <h6 class="card-title fw-bold text-truncate mb-1" [title]="product.name">{{ product.name }}</h6>
    
    <div class="text-warning mb-2" style="font-size: 0.75rem;">
      <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star-half-stroke"></i>
      <span class="text-muted ms-1">({{ product.reviewsCount }})</span>
    </div>

    <div class="d-flex justify-content-between align-items-center mt-auto mb-3">
      <span class="text-danger fw-bold">{{ product.price }}</span>
      <span class="text-muted text-decoration-line-through small">{{ product.originalPrice }}</span>
    </div>

    <button class="btn btn-outline-primary btn-sm w-100 fw-bold" [routerLink]="['/products', product.id]">
      Xem chi tiết
    </button>
  </div>
</div>
